<html>
  <head>
    <script src="./qrcode.min.js"></script>
    <style>
      body {
  
}
.content {
  height: 100%;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
  background: #fff;
}
.content .header {
  height: 30px;
  line-height: 30px;
  text-align: center;
}
.content .main {
  display: flex;
  align-items: center;
  flex-direction: row;
  height: 100%;
}
.content .wallet {
  width: 50%;
  height: 80%;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}
.content .witem {
  flex: 1;
  margin: 20px 10px;
  text-align: center;
}
.content .btn {
  background-color: DodgerBlue;
  border: none;
  /* Remove borders */
  color: white;
  /* White text */
  cursor: pointer;
  width: 80%;
  padding: 10px 10px;
}
.content .qr {
  width: 50%;
  align-items: center;
  align-content: center;
}
.content .qr img {
  margin-left: auto;
  margin-right: auto;
  display: block;
}    
  </style>
  </head>
  <body onload="onload()">
    <button style="float:right;border-width:0px;background:#fff" onclick="opay_close()" id="close">❌</button>
  
<main class="content">
  <div class="header" tid="title">Click Wallet or Scan QR</div>
           <div class="main">
            <div class="wallet">
              <div class="witem">
                <button class="btn" id='vbox' onclick="onPay('vbox')" tid="vbox">VBox</button>
                <div style="font-size:10px;color:red" tid="vinstall">Not found, click to install</div>
              </div>
              <div class="witem"><button class="btn" id='dot' onclick="onPay('dot')" tid="dot">DotWallet</button></div>
            </div>
             <div class="qr"><div id="qrcode" align="center"></div></div>
            </div>
            <span align="right" style="float: right;cursor: pointer;color: lightgray;" onclick="window.open('https://nbdomain-doc.glitch.me/#/help?id=_2-what-wallet-can-be-used-with-nbdomain','target=_blank')">❓</span>
</main>

    <script>
      const toolServer = "https://nb-namecheck.glitch.me"
      var pay_options = null;
      var options4wallet = null;
      var auto_pay=false;
      var current_orderID = 0;
      var state = {};
      let el_vbox = document.querySelector("#vbox");
      //let el_dot = document.querySelector("#radiodot");
      //let el_auto = document.querySelector("#autopay");
      let el_tab1 = document.querySelector("#radiofortab1");
      let el_tab2 = document.querySelector("#radiofortab2");
      let el_count_down = document.querySelector("#count_down");
      var expireObj = {};
      var log=console.log;
      Postmate.debug = true;
    const handshake = new Postmate.Model({
  // Expose your model to the Parent. Property values may be functions, promises, or regular values
  //height: () => document.height || document.body.offsetHeight,
  setUI:(UI)=>{
    log("setUI:",UI);
    if(UI.close != 'undefined'){
      log("setClose");
      document.querySelector("#close").style.display = UI.close ? "block" : "none";
    }
    if(UI.VBox){
      //el_vbox.disabled=false;
    } 
  },
  setup:(option)=>{
    log("setup option:",option);
    //setup state
    if(option.state){
      state = option.state;
      
    /*  if(state.wallet=="vbox"){
        el_vbox.checked=true;
        el_dot.checked=false;
      }
      if(state.wallet=="dot"){
        el_vbox.checked=false;
        el_dot.checked=true;
      }
      
      auto_pay = state.autopay;
    */  
      
    }
    //setup QRcode
    if(option.strQR){
      const strQR = option.strQR;
      var typeNumber = 0;
      var errorCorrectionLevel = 'L';
      var qr = qrcode(typeNumber, errorCorrectionLevel);
      qr.addData(strQR);
      qr.make();
      let strImgTag = qr.createImgTag();
      document.querySelector('#qrcode').innerHTML = strImgTag;
    }


  },
    
});
  
  function onload(){
    //console.log("iframe loaded");
    translate();
  }
  function translate(){
    if(navigator.language.toLowerCase()!="zh-cn") return;
    
    var cntext = {
        webPay:"网页",
        qrPay:"扫码",
        vbox:"傲游 VBox",
        dot:"打点钱包",
        title:"点击钱包或扫码",
        vinstall:"未检测到，点击安装"
      }
    var items = document.querySelectorAll("[tid]");
    for(let i=0;i<items.length;i++){
      const item = items[i];
      const tid = item.attributes['tid'].value;
      item.innerText = cntext[tid];
    }
  }
  function onPay(name){
    handshake.then(parent => {
           parent.emit('opay_frm_cmd', {cmd:"wallet",name:name,state:getState()});
        });
  }
  function getState(){
    const status = 0
    return status;
  }
  function opay_close(){
    handshake.then(parent => {
          parent.emit('opay_frm_cmd', {cmd:"close",state:getState()});
    });
  }
  
  function opay_ok(){
        
    if(el_vbox.checked){
        if(!VBox) return;
        handshake.then(parent => {
           parent.emit('opay_frm_cmd', {cmd:"wallet",name:"vbox",state:getState()});
        });
    }
          
    if(el_dot.checked){
        handshake.then(parent => {
            parent.emit('opay_frm_cmd', {cmd:"wallet",name:"dot",state:getState()});
        });

    }
        
  }
  
// When parent <-> child handshake is complete, events may be emitted to the parent

    </script>
